pretrain:
  epochs: 100
  batch_size: 16
  lr: 0.0001
  temperature: 0.1
  alpha: 1.0
  beta: 0.5
  hidden_dim: 300
  num_layers: 4
  num_heads: 8
  dropout: 0.1
  motif_lambda: 0.5
  proj_dim: 128
  pool: mean

finetune:
  epochs: 100
  batch_size: 16
  lr: 0.0001
  hidden_dim: 300
  num_layers: 5
  num_heads: 8
  dropout: 0.1
  motif_lambda: 0.5
  num_classes: 1
